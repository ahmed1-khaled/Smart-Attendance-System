{% extends "layout.html" %}

{% block content %}
<div class="card" style="box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); border-radius: 1rem; border: none; padding: 2.5rem;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="background: var(--primary); width: 60px; height: 60px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; color: white; font-size: 1.5rem;">
            <i class="fas fa-lock"></i>
        </div>
        <h2 style="font-weight: 700; color: #111827;">System Login</h2>
        <p style="color: var(--text-light); font-size: 0.9rem; margin-top: 0.5rem;">Please enter your credentials to access the dashboard</p>
    </div>

    <form method="POST">
        <div style="margin-bottom: 1.25rem;">
            <label for="username" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Username</label>
            <div style="position: relative;">
                <i class="fas fa-user" style="position: absolute; left: 1rem; top: 1rem; color: #9CA3AF;"></i>
                <input type="text" id="username" name="username" placeholder="Enter username" 
                       style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.75rem; border: 1px solid #D1D5DB; border-radius: 0.5rem; focus: border-primary; outline: none; transition: 0.2s;" required>
            </div>
        </div>
        <div style="margin-bottom: 1.75rem;">
            <label for="password" style="display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.5rem;">Password</label>
            <div style="position: relative;">
                <i class="fas fa-key" style="position: absolute; left: 1rem; top: 1rem; color: #9CA3AF;"></i>
                <input type="password" id="password" name="password" placeholder="••••••••" 
                       style="width: 100%; padding: 0.75rem 1rem 0.75rem 2.75rem; border: 1px solid #D1D5DB; border-radius: 0.5rem; outline: none; transition: 0.2s;" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; justify-content: center; font-weight: 600; font-size: 1rem;">
            Sign In
        </button>
    </form>

    <div style="margin-top: 1.5rem; text-align: center; font-size: 0.8rem; color: #9CA3AF;">
    </div>
</div>
{% endblock %}
